name: Generate lines of code stats

on:
  schedule:
    - cron: '0 0 * * *'   # daily update
  workflow_dispatch:      # manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # Get the current year automatically
      - name: Set current year
        id: date
        run: echo "year=$(date +'%Y')" >> $GITHUB_OUTPUT

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          CARD_YEAR: ${{ steps.date.outputs.year }}   # this is the trick – it *is* supported as an env var
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "profile-summary"   # cards will be pushed here
          UTC_OFFSET: 2                    # Egypt is UTC+2, change to your timezone
          EXCLUDE: ""
          AUTO_PUSH: true                  # the action commits and pushes automatically
