name: Generate lines of code stats

on:
  schedule:
    - cron: '0 0 * * *'   # daily update
  workflow_dispatch:      # manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # Get the current year automatically
      - name: Set current year
        id: date
        run: echo "year=$(date +'%Y')" >> $GITHUB_OUTPUT

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}   # <-- THIS IS THE FIX
          CARD_YEAR: ${{ steps.date.outputs.year }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "profile-summary"   # output branch
          UTC_OFFSET: 2                    # Egypt timezone
          EXCLUDE: ""
          AUTO_PUSH: true
